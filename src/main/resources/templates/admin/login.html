<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Admin Login - SafeShield</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-purple-200 to-blue-200 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-2xl shadow-xl w-96">

  <!-- Title -->
  <h2 class="text-3xl font-bold text-center text-purple-700 mb-2">
    SafeShield
  </h2>

  <p class="text-center text-gray-500 mb-6">
    Admin Portal Login
  </p>

  <!-- Login Form -->
  <form method="post" action="/admin/login">

    <input type="text"
           name="username"
           placeholder="Enter Username"
           class="w-full border border-gray-300 p-3 mb-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-400"
           required>

    <input type="password"
           name="password"
           placeholder="Enter Password"
           class="w-full border border-gray-300 p-3 mb-6 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-400"
           required>

    <button class="w-full bg-purple-600 hover:bg-purple-700 text-white p-3 rounded-lg font-semibold transition">
      Login
    </button>

  </form>

  <!-- Back to Dashboard -->
  <div class="text-center mt-6">
    <a href="/"
       class="text-purple-600 hover:underline font-medium">
      ← Back to Dashboard
    </a>
  </div>

</div>

</body>
</html>
