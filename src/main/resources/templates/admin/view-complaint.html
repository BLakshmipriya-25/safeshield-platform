<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Complaint Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-4xl mx-auto p-10">

    <h1 class="text-2xl font-bold text-purple-700 mb-6">
        Complaint Details
    </h1>

    <div class="bg-white p-6 shadow rounded space-y-4">

        <p><b>Case Number:</b> <span th:text="${complaint.caseNumber}"></span></p>

        <p><b>Victim ID:</b> <span th:text="${complaint.victimId}"></span></p>

        <p><b>Type:</b> <span th:text="${complaint.type}"></span></p>

        <p><b>Description:</b></p>

        <p class="bg-gray-100 p-3 rounded"
           th:text="${complaint.description}"></p>

        <p><b>Status:</b> <span th:text="${complaint.status}"></span></p>

    </div>

    <a href="/admin/complaints"
       class="mt-6 inline-block bg-gray-600 text-white px-4 py-2 rounded">
        ← Back
    </a>

</div>

</body>
</html>
