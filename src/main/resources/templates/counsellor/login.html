<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Counsellor Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-purple-700 via-indigo-600 to-blue-600 min-h-screen flex items-center justify-center">

<div class="w-full max-w-md">

  <!-- BRAND -->
  <div class="text-center text-white mb-8">
    <h1 class="text-4xl font-extrabold tracking-wide">SafeShield</h1>
    <p class="text-sm opacity-80">Counsellor Support Portal</p>
  </div>

  <!-- LOGIN CARD -->
  <div class="bg-white/90 backdrop-blur-lg shadow-2xl rounded-2xl p-10">

    <h2 class="text-2xl font-bold text-purple-700 text-center mb-6">
      Counsellor Login
    </h2>

    <form method="post" action="/counsellor/login" class="space-y-4">

      <!-- USERNAME -->
      <div>
        <label class="text-sm text-gray-600">Username</label>
        <input type="text"
               name="username"
               placeholder="Enter username"
               class="w-full border rounded-lg p-3 mt-1 focus:ring-2 focus:ring-purple-400 outline-none"
               required>
      </div>

      <!-- PASSWORD -->
      <div>
        <label class="text-sm text-gray-600">Password</label>
        <input type="password"
               name="password"
               placeholder="Enter password"
               class="w-full border rounded-lg p-3 mt-1 focus:ring-2 focus:ring-purple-400 outline-none"
               required>
      </div>

      <!-- LOGIN BUTTON -->
      <button type="submit"
              class="w-full bg-purple-600 text-white py-3 rounded-lg font-semibold hover:bg-purple-700 transition duration-300 shadow">
        Login to Dashboard
      </button>

    </form>

    <!-- DEMO CREDENTIALS -->
    <div class="mt-6 bg-purple-50 border border-purple-200 rounded-lg p-4 text-sm text-gray-700">
      <p class="font-semibold text-purple-700 mb-2">Demo Login Credentials</p>
      <p><strong>Username:</strong> counsellor</p>
      <p><strong>Password:</strong> support123</p>
    </div>

    <!-- BACK -->
    <div class="text-center mt-6">
      <a href="/"
         class="text-sm text-gray-500 hover:text-purple-600 hover:underline transition">
        ← Back to Home
      </a>
    </div>

  </div>

  <!-- FOOTER -->
  <p class="text-center text-white text-xs mt-6 opacity-80">
    SafeShield Counselling System © 2026
  </p>

</div>

</body>
</html>
