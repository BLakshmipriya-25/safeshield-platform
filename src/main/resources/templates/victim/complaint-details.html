<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Complaint Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen py-12">

<div class="max-w-5xl mx-auto bg-white shadow-xl rounded-2xl overflow-hidden">

    <!-- HEADER -->
    <div class="bg-indigo-700 text-white px-10 py-6 flex justify-between items-center">
        <div>
            <h2 class="text-2xl font-semibold">Complaint Details</h2>
            <p class="text-indigo-200 text-sm">Official Case Record</p>
        </div>

        <!-- Status Badge -->
        <div>
            <span th:if="${complaint.status == 'Under Review'}"
                  class="bg-yellow-400 text-black px-4 py-1 rounded-full text-sm font-medium">
                Under Review
            </span>

            <span th:if="${complaint.status == 'Investigation'}"
                  class="bg-blue-500 px-4 py-1 rounded-full text-sm font-medium">
                Investigation
            </span>

            <span th:if="${complaint.status == 'Closed'}"
                  class="bg-green-500 px-4 py-1 rounded-full text-sm font-medium">
                Closed
            </span>
        </div>
    </div>

    <!-- BODY CONTENT -->
    <div class="px-10 py-8 space-y-8">

        <!-- Case Info -->
        <div class="grid grid-cols-2 gap-8 text-gray-700">

            <div>
                <p class="text-sm text-gray-500">Case ID</p>
                <p class="text-lg font-semibold"
                   th:text="${complaint.caseNumber != null ? complaint.caseNumber : complaint.id}">
                </p>
            </div>

            <div>
                <p class="text-sm text-gray-500">Complaint Type</p>
                <p class="text-lg font-semibold"
                   th:text="${complaint.type}">
                </p>
            </div>

            <div>
                <p class="text-sm text-gray-500">Date Filed</p>
                <p class="text-lg font-semibold"
                   th:text="${complaint.date}">
                </p>
            </div>

        </div>

        <!-- Description -->
        <div>
            <h3 class="text-lg font-semibold text-gray-800 mb-3">
                Incident Description
            </h3>
            <p class="text-gray-700 leading-relaxed border-l-4 border-indigo-500 pl-4"
               th:text="${complaint.description}">
            </p>
        </div>

        <!-- Evidence -->
        <div th:if="${complaint.evidencePath != null}">
            <h3 class="text-lg font-semibold text-gray-800 mb-4">
                Uploaded Evidence
            </h3>

            <div class="flex justify-center">
                <img th:src="@{'/' + ${complaint.evidencePath}}"
                     class="max-h-96 rounded-lg shadow-md border"
                     alt="Evidence Image">
            </div>
        </div>

        <div th:if="${complaint.evidencePath == null}"
             class="text-gray-500 italic">
            No evidence uploaded.
        </div>

    </div>

    <!-- FOOTER -->
    <div class="bg-gray-50 px-10 py-5 text-right">
        <a th:href="@{'/victim/dashboard'(victimId=${victimId})}"
           class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition">
            ← Back to Dashboard
        </a>
    </div>

</div>

</body>
</html>
