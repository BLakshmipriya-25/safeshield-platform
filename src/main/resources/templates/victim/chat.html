<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Counsellor Chat - SafeShield</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .fade-in {
        animation: fadeIn 0.4s ease-in-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .typing-dot {
        height: 6px;
        width: 6px;
        background: #6b7280;
        border-radius: 50%;
        display: inline-block;
        margin-right: 3px;
        animation: blink 1.4s infinite both;
    }

    .typing-dot:nth-child(2) {
        animation-delay: 0.2s;
    }

    .typing-dot:nth-child(3) {
        animation-delay: 0.4s;
    }

    @keyframes blink {
        0% { opacity: 0.2; }
        20% { opacity: 1; }
        100% { opacity: 0.2; }
    }
  </style>
</head>

<body class="bg-gradient-to-br from-purple-100 via-indigo-100 to-purple-200 min-h-screen flex items-center justify-center">

<div class="w-full max-w-3xl h-[88vh] bg-white rounded-3xl shadow-2xl flex flex-col overflow-hidden">

  <!-- 🔷 Header -->
  <div class="bg-purple-700 text-white p-5 flex justify-between items-center shadow">
    <div>
      <h2 class="text-lg font-semibold">Counsellor Support</h2>
      <p class="text-xs opacity-80">🟢 Online • Always here to help</p>
    </div>

    <a th:href="@{'/victim/dashboard'(victimId=${victimId})}"
       class="bg-white text-purple-700 px-4 py-1 rounded-full text-sm hover:bg-gray-100 transition">
      Back
    </a>
  </div>

  <!-- 💬 Chat Area -->
  <div id="chatBox"
       class="flex-1 p-6 overflow-y-auto space-y-5 bg-gradient-to-b from-white to-purple-50">

    <div th:each="msg : ${messages}" class="fade-in">

      <!-- Victim -->
      <div th:if="${msg.sender == 'VICTIM'}"
           class="flex justify-end">

        <div class="bg-purple-600 text-white px-5 py-3 rounded-2xl rounded-br-sm max-w-xs shadow-md relative">

          <p th:text="${msg.message}"></p>

          <span class="text-[10px] opacity-70 block text-right mt-1">
                        You • <span th:text="${#temporals.format(msg.timestamp, 'HH:mm')}"></span>
                    </span>

        </div>
      </div>

      <!-- Counsellor -->
      <div th:if="${msg.sender == 'COUNSELLOR'}"
           class="flex justify-start">

        <div class="bg-white border border-gray-200 text-gray-800 px-5 py-3 rounded-2xl rounded-bl-sm max-w-xs shadow-sm relative">

          <p th:text="${msg.message}"></p>

          <span class="text-[10px] text-gray-500 block text-right mt-1">
                        Counsellor • <span th:text="${#temporals.format(msg.timestamp, 'HH:mm')}"></span>
                    </span>

        </div>
      </div>

    </div>

    <!-- Typing Indicator (Hidden by default) -->
    <div id="typingIndicator" class="hidden flex justify-start">
      <div class="bg-white border border-gray-200 px-5 py-3 rounded-2xl shadow-sm">
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
      </div>
    </div>

  </div>

  <!-- ✍️ Input Section -->
  <div class="bg-white p-4 border-t flex items-center gap-3">

    <form th:action="@{/victim/send-message}" method="post"
          class="flex gap-3 w-full items-center"
          onsubmit="showTyping()">

      <input type="hidden" name="victimId"
             th:value="${victimId}"/>

      <input type="text" name="message"
             class="flex-1 border rounded-full px-5 py-3 focus:outline-none focus:ring-2 focus:ring-purple-400 shadow-sm"
             placeholder="Type your message..."
             required>

      <button type="submit"
              class="bg-purple-600 text-white px-6 py-3 rounded-full hover:bg-purple-700 transition shadow-md">
        Send
      </button>
    </form>

  </div>

</div>

<!-- 🔥 Auto Scroll + Typing Simulation -->
<script>
  const chatBox = document.getElementById("chatBox");
  chatBox.scrollTop = chatBox.scrollHeight;

  function showTyping() {
      const typing = document.getElementById("typingIndicator");
      typing.classList.remove("hidden");

      setTimeout(() => {
          typing.classList.add("hidden");
      }, 1500);
  }
</script>

</body>
</html>
