<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>File Complaint</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white p-8 rounded shadow-md w-full max-w-lg">

    <h2 class="text-2xl font-bold mb-6 text-purple-600 text-center">
        File New Complaint
    </h2>

    <form method="post"
          enctype="multipart/form-data"
          th:action="@{/victim/file-complaint}"
          class="space-y-4">

        <input type="hidden" name="victimId" th:value="${victimId}" />

        <!-- 🔥 NEW Hidden Location Fields -->
        <input type="hidden" name="latitude" id="latitude">
        <input type="hidden" name="longitude" id="longitude">

        <div>
            <label class="block font-semibold mb-1">Harassment Type</label>
            <select name="type" class="w-full border p-2 rounded" required>
                <option value="Blackmail">Blackmail</option>
                <option value="Cyberbullying">Cyberbullying</option>
                <option value="Stalking">Stalking</option>
                <option value="Threat">Threat</option>
            </select>
        </div>

        <div>
            <label class="block font-semibold mb-1">Description</label>
            <textarea name="description"
                      class="w-full border p-2 rounded"
                      rows="4"
                      required></textarea>
        </div>

        <div>
            <label class="block font-semibold mb-2">Upload Evidence</label>
            <input type="file"
                   name="file"
                   class="border px-3 py-2 rounded w-full">
        </div>

        <button type="submit"
                class="w-full bg-purple-600 text-white py-2 rounded hover:bg-purple-700">
            Submit Complaint
        </button>

    </form>

    <a th:href="@{'/victim/dashboard'(victimId=${victimId})}"
       class="block text-center mt-4 text-gray-500 hover:underline">
        Back to Dashboard
    </a>

</div>

<!-- 🔥 Browser Location Script -->
<script>
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
            document.getElementById("latitude").value =
                position.coords.latitude;

            document.getElementById("longitude").value =
                position.coords.longitude;
        });
    }
</script>

</body>
</html>
